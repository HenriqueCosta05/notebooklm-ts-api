upstream notebooklm_api {
    server notebooklm-api-dev:3000;
}

server {
    listen 80;
    server_name notebooklm.api.dev;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name notebooklm.api.dev;

    ssl_certificate     /etc/nginx/certs/notebooklm.api.dev+1.pem;
    ssl_certificate_key /etc/nginx/certs/notebooklm.api.dev+1-key.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       10m;

    location / {
        proxy_pass         http://notebooklm_api;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}
